<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Control Dual</title>
<style>
  :root { 
    --amarillo: #F5C400; --fondo: #1A1A1A; --superficie: #242424; 
    --superficie2: #2E2E2E; --borde: #3A3A3A; --texto: #F0EDE4; 
    --verde: #3DB85A; --rojo: #E24B4A; --azul: #3498db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--fondo); color: var(--texto); 
    font-family: -apple-system, sans-serif; height: 100vh; 
    display: flex; flex-direction: column; overflow: hidden;
  }
  
  /* Panel de Control Superior */
  header { 
    background: var(--superficie); padding: 10px; 
    display: flex; flex-direction: column; gap: 10px;
    border-bottom: 2px solid var(--amarillo);
  }
  .controles-superiores { display: flex; gap: 8px; }
  
  .btn-accion { 
    flex: 1; border: none; padding: 12px; border-radius: 8px; 
    font-size: 10px; font-weight: 900; text-transform: uppercase;
    transition: 0.2s;
  }
  .btn-local { background: var(--amarillo); color: #1A1A1A; }
  .btn-nube { background: var(--azul); color: white; }
  .btn-accion:active { opacity: 0.7; transform: scale(0.98); }

  .semana-nav { 
    display: flex; align-items: center; padding: 5px 10px; 
    background: var(--superficie2); justify-content: space-between;
  }
  .semana-nav button { background: var(--borde); border: none; color: white; padding: 5px 15px; border-radius: 5px; }

  .dias-header { display: grid; grid-template-columns: 90px repeat(7, 1fr); background: var(--superficie); }
  .dia-col { text-align: center; padding: 8px 2px; font-size: 9px; font-weight: 700; color: #888; }
  
  #scroll-area { flex: 1; overflow-y: auto; }
  .obrero-row { 
    display: grid; grid-template-columns: 90px repeat(7, 1fr); 
    border-bottom: 1px solid var(--borde); align-items: center; min-height: 55px; 
  }
  .nombre { font-size: 10px; font-weight: 700; padding-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .estado-btn { 
    width: 32px; height: 32px; border-radius: 6px; border: none; 
    background: var(--superficie2); color: #444; font-size: 12px; font-weight: bold; margin: auto;
  }
  .estado-btn.presente { background: rgba(61,184,90,0.3); color: var(--verde); }
  .estado-btn.ausente { background: rgba(226,75,74,0.3); color: var(--rojo); }
  .estado-btn.horas { background: rgba(52,152,219,0.3); color: var(--azul); border: 1px solid var(--azul); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--superficie); border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid var(--borde); }
  .btn-opcion { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: 800; margin-bottom: 10px; }
  .input-extra { width: 100%; background: var(--fondo); border: 1px solid var(--borde); color: white; padding: 15px; border-radius: 8px; margin: 10px 0; font-size: 18px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="controles-superiores">
    <button class="btn-accion btn-local" onclick="confirmarLocal()">💾 Guardar en Web</button>
    <button class="btn-accion btn-nube" onclick="enviarANube()">☁️ Guardar en Nube</button>
  </div>
</header>

<div class="semana-nav">
  <button onclick="cambiarSemana(-1)">‹</button>
  <div id="nav-titulo" style="font-size: 11px; font-weight: bold;"></div>
  <button onclick="cambiarSemana(1)">›</button>
</div>

<div class="dias-header" id="dias-header"></div>
<div id="scroll-area"><div id="lista-obreros"></div></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const WEB_APP_URL = "TU_URL_DE_GOOGLE_AQUI"; 

let obreros = ['Adolf.', 'Andrs.', 'Eleu.', 'Gavin', 'Vict.', 'Nildo', 'Geron.', 'Dario.', 'Alberto Manuel', 'JuanC. Velasq.'];
// Datos temporales de la sesión actual
let asistenciaTemp = JSON.parse(localStorage.getItem('as_sdb_local')) || {};
let costos = {}; 
let semanaOffset = 0; let mOb = '', mDk = '';
const LABELS = ['LU','MA','MI','JU','VI','SA','DO'];

// BOTÓN 1: GUARDA SOLO EN EL CELULAR (PARA VER CAMBIOS EN WEB)
function confirmarLocal() {
    localStorage.setItem('as_sdb_local', JSON.stringify(asistenciaTemp));
    alert("Cambios guardados en la Web. (Todavía no están en el Sheets)");
    renderizar();
}

// BOTÓN 2: ENVÍA LO QUE ESTÁ EN EL CELULAR AL SHEETS
async function enviarANube() {
    const btn = document.querySelector('.btn-nube');
    btn.textContent = "⏳ SUBIENDO...";
    try {
        await fetch(WEB_APP_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ obreros, asistencia: asistenciaTemp, costos }) 
        });
        alert("✅ Sincronizado con Google Sheets con éxito.");
        btn.textContent = "☁️ Guardar en Nube";
    } catch (e) {
        alert("❌ Error de red. Reintentá.");
        btn.textContent = "☁️ Guardar en Nube";
    }
}

async function inicializar() {
    try {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        if(data && data.ASISTENCIA_DATA) {
            asistenciaTemp = data.ASISTENCIA_DATA;
            renderizar();
        }
    } catch (e) { renderizar(); }
}

const key = d => `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;

function renderizar() {
    const h = new Date(); let dHoy = h.getDay(); let l = new Date(h);
    l.setDate(h.getDate() - (dHoy === 0 ? 6 : dHoy - 1) + semanaOffset * 7);
    const ds = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return d; });
    
    document.getElementById('nav-titulo').textContent = "Semana: " + ds[0].getDate() + " al " + ds[6].getDate();
    document.getElementById('dias-header').innerHTML = '<div class="dia-col"></div>' + ds.map((d,i) => `<div class="dia-col">${LABELS[i]}<br>${d.getDate()}</div>`).join('');
    
    document.getElementById('lista-obreros').innerHTML = obreros.map(ob => `
      <div class="obrero-row">
        <div class="nombre">${ob}</div>
        ${ds.map(d => {
            const v = (asistenciaTemp[ob] && asistenciaTemp[ob][key(d)]) ? asistenciaTemp[ob][key(d)] : {estado:'vacio'};
            let t = v.estado === 'presente' ? '✓' : (v.estado === 'ausente' ? '✕' : (v.estado === 'horas' ? v.horas+'h' : ''));
            return `<div style="text-align:center"><button class="estado-btn ${v.estado}" onclick="abrirCelda('${ob}','${key(d)}')">${t}</button></div>`;
        }).join('')}
      </div>`).join('');
}

function abrirCelda(ob, dk) {
    mOb = ob; mDk = dk;
    const v = (asistenciaTemp[ob] && asistenciaTemp[ob][dk]) ? asistenciaTemp[ob][dk] : {horas:0};
    document.getElementById('modal-content').innerHTML = `
      <h3 style="text-align:center; color:var(--amarillo); margin-bottom:15px">${ob}</h3>
      <button class="btn-opcion" style="background:var(--verde); color:white" onclick="setTemp('presente')">MARCAR PRESENTE</button>
      <button class="btn-opcion" style="background:var(--rojo); color:white" onclick="setTemp('ausente')">MARCAR AUSENTE</button>
      <input type="number" id="h-in" class="input-extra" value="${v.horas || ''}" placeholder="0.0">
      <button class="btn-opcion" style="background:var(--azul); color:white" onclick="setTemp('horas')">CARGAR HORAS EXTRA</button>
      <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:#888; margin-top:10px">Cerrar sin cambiar</button>
    `;
    document.getElementById('overlay').style.display = 'flex';
}

function setTemp(e) {
    let h = parseFloat(document.getElementById('h-in')?.value) || 0;
    if(e === 'horas' && h === 0) e = 'presente';
    if(!asistenciaTemp[mOb]) asistenciaTemp[mOb] = {};
    asistenciaTemp[mOb][mDk] = {estado: e, horas: h};
    cerrarModal();
    renderizar(); // Actualiza la vista pero NO guarda permanentemente hasta tocar el botón de arriba
}

function cambiarSemana(v) { semanaOffset += v; renderizar(); }
function cerrarModal() { document.getElementById('overlay').style.display = 'none'; }

inicializar();
</script>
</body>
</html>
