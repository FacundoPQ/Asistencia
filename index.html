<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Gestión Integral</title>
<style>
  :root { --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424; --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A; --azul: #3498db; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--fondo); color: var(--texto); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; margin: 0; }

  /* CABECERA FIJA */
  #header-fijo { position: absolute; top: 0; width: 100%; height: 115px; background: var(--sup); z-index: 100; border-bottom: 2px solid var(--amarillo); }
  .controles { display: flex; gap: 8px; padding: 10px; }
  .btn-acc { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
  .btn-web { background: var(--amarillo); color: #1A1A1A; }
  .btn-nube { background: var(--azul); color: white; }
  .nav-sem { display: flex; align-items: center; padding: 5px 10px; background: #2E2E2E; justify-content: space-between; font-size: 11px; }

  /* LISTADO PRINCIPAL */
  .grid-header { display: grid; grid-template-columns: 90px repeat(7, 1fr); background: var(--sup); }
  .d-col { text-align: center; padding: 8px 2px; font-size: 9px; font-weight: 700; color: #888; }
  #scroll-area { position: absolute; top: 115px; bottom: 0; width: 100%; overflow-y: auto; padding-bottom: 80px; }
  .fila { display: grid; grid-template-columns: 90px repeat(7, 1fr); border-bottom: 1px solid var(--borde); align-items: center; min-height: 55px; }
  .nom { font-size: 10px; font-weight: 700; padding-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-est { width: 32px; height: 32px; border-radius: 6px; border: none; background: #2E2E2E; color: #444; font-size: 12px; font-weight: bold; margin: auto; }
  .btn-est.presente { background: rgba(61,184,90,0.3); color: var(--verde); }
  .btn-est.ausente { background: rgba(226,75,74,0.3); color: var(--rojo); }
  .btn-est.horas { background: rgba(52,152,219,0.3); color: var(--azul); border: 1px solid var(--azul); }

  /* BOTÓN FLOTANTE (HAMBURGUESA) */
  #fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--amarillo); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 200; border: none; }
  #fab span { width: 25px; height: 3px; background: #1A1A1A; border-radius: 2px; }

  /* MODAL DE MENÚ / CONFIGURACIÓN */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; }
  .tabs { display: flex; background: var(--sup); padding: 10px; gap: 5px; }
  .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #333; color: #888; font-size: 11px; font-weight: 800; }
  .tab-btn.active { background: var(--amarillo); color: #1A1A1A; }
  .tab-content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
  .tab-content.active { display: block; }

  /* TABLAS DE COSTOS Y PERSONAL */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: #888; padding-bottom: 10px; font-size: 10px; }
  td { padding: 10px 0; border-bottom: 1px solid #333; }
  input[type="number"], input[type="text"] { background: #333; border: 1px solid var(--borde); color: white; padding: 8px; border-radius: 5px; width: 100%; text-align: center; }
  .btn-del { color: var(--rojo); background: none; border: none; font-size: 18px; }
</style>
</head>
<body>

<div id="header-fijo">
  <div class="controles">
    <button class="btn-acc btn-web" onclick="guardarWeb()">💾 Guardar Web</button>
    <button class="btn-acc btn-nube" onclick="subirNube()">☁️ Guardar Nube</button>
  </div>
  <div class="nav-sem">
    <button onclick="moverSem(-1)" style="background:none; border:none; color:white; font-size:20px">‹</button>
    <div id="tit-sem"></div>
    <button onclick="moverSem(1)" style="background:none; border:none; color:white; font-size:20px">›</button>
  </div>
  <div class="grid-header" id="dias-h"></div>
</div>

<div id="scroll-area"><div id="lista"></div></div>

<button id="fab" onclick="abrirMenu()"><span></span><span></span><span></span></button>

<div class="overlay" id="menu-overlay">
  <div class="tabs">
    <button class="tab-btn active" onclick="verTab(0)">PRESUPUESTO</button>
    <button class="tab-btn" onclick="verTab(1)">CONFIG. COSTOS</button>
    <button class="tab-btn" onclick="verTab(2)">PERSONAL</button>
  </div>
  
  <div id="t0" class="tab-content active"></div>
  <div id="t1" class="tab-content"></div>
  <div id="t2" class="tab-content"></div>
  
  <button onclick="cerrarMenu()" style="margin: 20px; padding: 15px; background: var(--sup); color: white; border: none; border-radius: 10px;">VOLVER A PLANILLA</button>
</div>

<div class="overlay" id="asistencia-overlay" style="justify-content:center; align-items:center; padding:20px">
  <div id="modal-asistencia" style="background:var(--sup); width:100%; max-width:400px; padding:20px; border-radius:15px; border:1px solid var(--borde)"></div>
</div>

<script>
const URL = "TU_URL_AQUI"; // REEMPLAZAR

let obreros = ['Adolf.', 'Andrs.', 'Eleu.', 'Gavin', 'Vict.', 'Nildo', 'Geron.', 'Dario.', 'Alberto Manuel', 'JuanC. Velasq.'];
let asistencia = JSON.parse(localStorage.getItem('as_sdb')) || {};
let costosConfig = JSON.parse(localStorage.getItem('co_sdb')) || {};
let semOff = 0; let mOb = '', mDk = '';
const DIAS = ['LU','MA','MI','JU','VI','SA','DO'];

// Inicializar configuración si está vacía
function checkConfig() {
  obreros.forEach(ob => { if(!costosConfig[ob]) costosConfig[ob] = { norm: 0, ext: 0, jorn: 9 }; });
}

function guardarWeb() {
    localStorage.setItem('as_sdb', JSON.stringify(asistencia));
    localStorage.setItem('co_sdb', JSON.stringify(costosConfig));
    alert("Guardado en Web local.");
    render();
}

async function subirNube() {
    const b = document.querySelector('.btn-nube'); b.textContent = "⌛ SUBIENDO...";
    try {
        await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ obreros, asistencia, costosConfig }) });
        alert("✅ Sheets Actualizado."); b.textContent = "☁️ Guardar Nube";
    } catch (e) { alert("❌ Error conexión."); b.textContent = "☁️ Guardar Nube"; }
}

async function cargar() {
    try {
        const r = await fetch(URL); const d = await r.json();
        if(d.OBREROS_LISTA) obreros = d.OBREROS_LISTA;
        if(d.ASISTENCIA_DATA) asistencia = d.ASISTENCIA_DATA;
        if(d.COSTOS_CONFIG) costosConfig = d.COSTOS_CONFIG;
        checkConfig(); render();
    } catch (e) { checkConfig(); render(); }
}

const gK = d => `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;

function render() {
    const h = new Date(); let l = new Date(h);
    l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const ds = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return d; });
    
    document.getElementById('tit-sem').textContent = "Semana del " + ds[0].getDate() + " al " + ds[6].getDate();
    document.getElementById('dias-h').innerHTML = '<div class="d-col"></div>' + ds.map((d,i) => `<div class="d-col">${DIAS[i]}<br>${d.getDate()}</div>`).join('');
    
    document.getElementById('lista').innerHTML = obreros.map(ob => `
      <div class="fila">
        <div class="nom">${ob}</div>
        ${ds.map(d => {
            const v = (asistencia[ob] && asistencia[ob][gK(d)]) ? asistencia[ob][gK(d)] : {estado:'vacio'};
            let t = v.estado === 'presente' ? '✓' : (v.estado === 'ausente' ? '✕' : (v.estado === 'horas' ? v.horas+'h' : ''));
            return `<div style="text-align:center"><button class="btn-est ${v.estado}" onclick="abrirAsis('${ob}','${gK(d)}')">${t}</button></div>`;
        }).join('')}
      </div>`).join('');
}

// FUNCIONES DEL MENÚ
function abrirMenu() { 
    actualizarTablas();
    document.getElementById('menu-overlay').style.display = 'flex'; 
}
function cerrarMenu() { document.getElementById('menu-overlay').style.display = 'none'; render(); }

function verTab(n) {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[n].classList.add('active');
    document.getElementById('t' + n).classList.add('active');
    actualizarTablas();
}

function actualizarTablas() {
    // Tab 0: Presupuesto (Resumen Semanal)
    let h = new Date(); let l = new Date(h);
    l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const ds = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return gK(d); });

    let html0 = `<h3>Resumen de Costos (Semana Actual)</h3><table><tr><th>NOMBRE</th><th>SEMANA</th></tr>`;
    let totalSem = 0;
    obreros.forEach(ob => {
        let sub = 0;
        const conf = costosConfig[ob] || {norm:0, ext:0, jorn:9};
        ds.forEach(k => {
            const reg = (asistencia[ob] && asistencia[ob][k]) ? asistencia[ob][k] : null;
            if(reg) {
                if(reg.estado === 'presente') sub += (conf.norm * conf.jorn);
                if(reg.estado === 'horas') sub += (conf.norm * conf.jorn) + (reg.horas * conf.ext);
            }
        });
        totalSem += sub;
        html0 += `<tr><td>${ob}</td><td>$${sub.toLocaleString()}</td></tr>`;
    });
    html0 += `<tr style="color:var(--amarillo); font-weight:bold"><td>TOTAL</td><td>$${totalSem.toLocaleString()}</td></tr></table>`;
    document.getElementById('t0').innerHTML = html0;

    // Tab 1: Config. Costos
    let html1 = `<table><tr><th>PERSONAL</th><th>$/NORM.</th><th>$/EXT.</th><th>HS/JORN.</th></tr>`;
    obreros.forEach(ob => {
        const c = costosConfig[ob] || {norm:0, ext:0, jorn:9};
        html1 += `<tr>
            <td style="font-size:10px">${ob}</td>
            <td><input type="number" value="${c.norm}" onchange="updC('${ob}','norm',this.value)"></td>
            <td><input type="number" value="${c.ext}" onchange="updC('${ob}','ext',this.value)"></td>
            <td><input type="number" value="${c.jorn}" onchange="updC('${ob}','jorn',this.value)"></td>
        </tr>`;
    });
    html1 += `</table>`;
    document.getElementById('t1').innerHTML = html1;

    // Tab 2: Personal
    let html2 = `<div style="margin-bottom:20px"><input type="text" id="new-ob" placeholder="Nombre..." style="width:70%; text-align:left"> 
                 <button onclick="addOb()" style="width:25%; background:var(--amarillo); border:none; padding:10px; border-radius:5px">AÑADIR</button></div>`;
    obreros.forEach((ob, idx) => {
        html2 += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333">
                  <span>${ob}</span><button class="btn-del" onclick="delOb(${idx})">✕</button></div>`;
    });
    document.getElementById('t2').innerHTML = html2;
}

// Auxiliares Personal y Costos
function updC(ob, k, v) { costosConfig[ob][k] = parseFloat(v) || 0; }
function addOb() { 
    const n = document.getElementById('new-ob').value; 
    if(n) { obreros.push(n); costosConfig[n] = {norm:0, ext:0, jorn:9}; document.getElementById('new-ob').value=''; actualizarTablas(); }
}
function delOb(i) { if(confirm("¿Eliminar?")) { obreros.splice(i, 1); actualizarTablas(); } }

// Modal Asistencia
function abrirAsis(ob, dk) {
    mOb = ob; mDk = dk;
    const v = (asistencia[ob] && asistencia[ob][dk]) ? asistencia[ob][dk] : {horas:''};
    document.getElementById('modal-asistencia').innerHTML = `
      <h3 style="text-align:center; color:var(--amarillo)">${ob}</h3>
      <button class="btn-acc" style="background:var(--verde); width:100%; margin-bottom:10px; color:white" onclick="setA('presente')">PRESENTE</button>
      <button class="btn-acc" style="background:var(--rojo); width:100%; margin-bottom:10px; color:white" onclick="setA('ausente')">AUSENTE</button>
      <input type="number" id="h-in" class="in-h" style="width:100%; padding:15px; margin-bottom:10px; background:#1A1A1A; border:1px solid #444; color:white" value="${v.horas}" placeholder="Horas Extra">
      <button class="btn-acc" style="background:var(--azul); width:100%; color:white" onclick="setA('horas')">CARGAR HORAS</button>
      <button onclick="document.getElementById('asistencia-overlay').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:15px">CANCELAR</button>
    `;
    document.getElementById('asistencia-overlay').style.display = 'flex';
}

function setA(e) {
    let h = parseFloat(document.getElementById('h-in').value) || 0;
    if(e === 'horas' && h === 0) e = 'presente';
    if(!asistencia[mOb]) asistencia[mOb] = {};
    asistencia[mOb][mDk] = {estado: e, horas: h};
    document.getElementById('asistencia-overlay').style.display = 'none';
    render();
}

function moverSem(v) { semOff += v; render(); }
cargar();
</script>
</body>
</html>
