<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root { --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424; --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A; --azul: #3498db; --naranja: #e67e22; --gris: #555; }
  
  html, body { background: var(--fondo); color: var(--texto); font-family: -apple-system, sans-serif; height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; }

  /* CABECERA COMPACTA */
  #header-fijo { position: absolute; top: 0; left: 0; right: 0; height: 130px; background: var(--sup); z-index: 100; border-bottom: 2px solid var(--amarillo); }
  .controles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px; }
  .btn-acc { border: none; padding: 8px 0; border-radius: 4px; font-size: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; text-align: center; }
  
  .btn-web { background: var(--amarillo); color: #1A1A1A; }
  .btn-pdf-dia { background: var(--gris); color: white; }
  .btn-pdf-sem { background: var(--azul); color: white; }
  .btn-pdf-mes { background: var(--naranja); color: white; }
  
  .nav-sem { display: flex; align-items: center; padding: 2px 10px; background: #2E2E2E; justify-content: space-between; font-size: 10px; height: 30px; }
  .grid-header { display: grid; grid-template-columns: 80px repeat(7, 1fr); background: var(--sup); }
  .d-col { text-align: center; padding: 4px 0; font-size: 8px; font-weight: 700; color: #888; }

  /* LISTADO AJUSTADO */
  #scroll-area { position: absolute; top: 130px; bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .fila { display: grid; grid-template-columns: 80px repeat(7, 1fr); border-bottom: 1px solid var(--borde); align-items: center; min-height: 48px; }
  .nom { font-size: 9px; font-weight: 600; padding-left: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }
  
  .btn-est { width: 28px; height: 28px; border-radius: 4px; border: none; background: #2E2E2E; color: #444; font-size: 10px; font-weight: bold; margin: auto; }
  .btn-est.presente { background: rgba(61,184,90,0.3); color: var(--verde); }
  .btn-est.ausente { background: rgba(226,75,74,0.3); color: var(--rojo); }
  .btn-est.horas { background: rgba(52,152,219,0.3); color: var(--azul); border: 1px solid var(--azul); }

  #fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--amarillo); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 3px; z-index: 150; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  #fab span { width: 20px; height: 2px; background: #1A1A1A; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; }
  .tabs { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--sup); padding: 8px; gap: 4px; }
  .tab-btn { padding: 8px 2px; border: none; border-radius: 4px; background: #333; color: #888; font-size: 8px; font-weight: 800; }
  .tab-btn.active { background: var(--amarillo); color: #1A1A1A; }
  .tab-content { flex: 1; overflow-y: auto; padding: 12px; display: none; }
  .tab-content.active { display: block; }
  
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  td { padding: 10px 0; border-bottom: 1px solid #333; }
  input { background: #333; border: 1px solid var(--borde); color: white; padding: 8px; border-radius: 4px; width: 90%; font-size: 14px; text-align: center; }
</style>
</head>
<body>

<div id="header-fijo">
  <div class="controles">
    <button class="btn-acc btn-web" onclick="guardarWeb()">Local</button>
    <button class="btn-acc btn-pdf-dia" onclick="generarPDFDiario()">Diario</button>
    <button class="btn-acc btn-pdf-sem" onclick="generarPDF('semanal')">Semanal</button>
    <button class="btn-acc btn-pdf-mes" onclick="generarPDF('mensual')">Mensual</button>
  </div>
  <div class="nav-sem">
    <button onclick="moverSem(-1)" style="background:none; border:none; color:white; font-size:18px">‹</button>
    <div id="tit-sem" style="font-weight:bold"></div>
    <button onclick="moverSem(1)" style="background:none; border:none; color:white; font-size:18px">›</button>
  </div>
  <div class="grid-header" id="dias-h"></div>
</div>

<div id="scroll-area"><div id="lista"></div></div>

<button id="fab" onclick="abrirMenu()"><span></span><span></span><span></span></button>

<div class="overlay" id="menu-overlay">
  <div class="tabs">
    <button class="tab-btn active" onclick="verTab(0)">COSTOS</button>
    <button class="tab-btn" onclick="verTab(1)">MES</button>
    <button class="tab-btn" onclick="verTab(2)">PRECIOS</button>
    <button class="tab-btn" onclick="verTab(3)">LISTA</button>
  </div>
  <div id="t0" class="tab-content active"></div>
  <div id="t1" class="tab-content"></div>
  <div id="t2" class="tab-content"></div>
  <div id="t3" class="tab-content"></div>
  <button onclick="cerrarMenu()" style="margin: 10px; padding: 15px; background: var(--amarillo); color: #1A1A1A; border: none; border-radius: 8px; font-weight: 900; font-size: 12px;">VOLVER A PLANILLA</button>
</div>

<div class="overlay" id="asistencia-overlay" style="justify-content:center; align-items:center; padding:20px">
  <div id="modal-asistencia" style="background:var(--sup); width:100%; max-width:350px; padding:20px; border-radius:12px; border:1px solid var(--borde)"></div>
</div>

<script>
let personal = ['Adolf.', 'Andrs.', 'Eleu.', 'Gavin', 'Vict.', 'Nildo', 'Geron.', 'Dario.', 'Alberto Manuel', 'JuanC. Velasq.'];
let asistencia = JSON.parse(localStorage.getItem('as_sdb')) || {};
let costosConfig = JSON.parse(localStorage.getItem('co_sdb')) || {};
let semOff = 0; let mPers = '', mDk = '';
const DIAS = ['LU','MA','MI','JU','VI','SA','DO'];

function guardarWeb() {
    localStorage.setItem('as_sdb', JSON.stringify(asistencia));
    localStorage.setItem('co_sdb', JSON.stringify(costosConfig));
    alert("Guardado OK");
    render();
}

function generarPDFDiario() {
    const hoy = new Date(); const k = gK(hoy);
    let t = `<table style="width:100%; border:1px solid #000; font-family:Arial">
             <tr style="background:#ddd"><th>PERSONAL</th><th>ESTADO</th><th>OBS.</th></tr>`;
    personal.forEach(p => {
        const r = (asistencia[p] && asistencia[p][k]) ? asistencia[p][k] : {estado: '---'};
        let st = r.estado === 'presente' ? 'PRESENTE' : (r.estado === 'horas' ? `EXTRA (${r.horas}h)` : (r.estado === 'ausente' ? 'AUSENTE' : '---'));
        t += `<tr><td style="padding:8px; border-bottom:1px solid #eee">${p}</td><td>${st}</td><td>__________</td></tr>`;
    });
    const el = document.createElement('div');
    el.innerHTML = `<div style="padding:20px"><h2>SDB - PARTE DIARIO</h2><p>Fecha: ${hoy.toLocaleDateString()}</p><br>${t}</table></div>`;
    html2pdf().set({margin:1, filename:`Diario_${k}.pdf`}).from(el).save();
}

function generarPDF(tipo) {
    actualizarTablas();
    const h = new Date(); 
    let l = new Date(h); l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const tit = tipo === 'semanal' ? 'REPORTE SEMANAL' : 'REPORTE MENSUAL';
    const sub = tipo === 'semanal' ? document.getElementById('tit-sem').textContent : l.toLocaleString('es',{month:'long',year:'numeric'});
    const el = document.createElement('div');
    el.innerHTML = `<div style="padding:20px; font-family:Arial"><h2>SDB - ${tit}</h2><p>Periodo: ${sub}</p><hr>${document.getElementById(tipo==='semanal'?'t0':'t1').innerHTML}</div>`;
    html2pdf().set({margin:0.5, filename:`${tipo}_${sub}.pdf` text: 'SDB'}).from(el).save();
}

const gK = d => `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;

function render() {
    const h = new Date(); let l = new Date(h);
    l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const ds = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return d; });
    document.getElementById('tit-sem').textContent = ds[0].getDate() + " al " + ds[6].getDate() + " " + ds[0].toLocaleString('es', {month:'short'}).toUpperCase();
    document.getElementById('dias-h').innerHTML = '<div class="d-col"></div>' + ds.map((d,i) => `<div class="d-col">${DIAS[i]}<br>${d.getDate()}</div>`).join('');
    document.getElementById('lista').innerHTML = personal.map(p => `
      <div class="fila"><div class="nom">${p}</div>
        ${ds.map(d => {
            const v = (asistencia[p] && asistencia[p][gK(d)]) ? asistencia[p][gK(d)] : {estado:'vacio'};
            let t = v.estado === 'presente' ? '✓' : (v.estado === 'ausente' ? '✕' : (v.estado === 'horas' ? v.horas+'h' : ''));
            return `<div style="text-align:center"><button class="btn-est ${v.estado}" onclick="abrirAsis('${p}','${gK(d)}')">${t}</button></div>`;
        }).join('')}</div>`).join('');
}

function abrirMenu() { actualizarTablas(); document.getElementById('menu-overlay').style.display = 'flex'; }
function cerrarMenu() { document.getElementById('menu-overlay').style.display = 'none'; render(); }
function verTab(n) {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[n].classList.add('active');
    document.getElementById('t' + n).classList.add('active');
    actualizarTablas();
}

function actualizarTablas() {
    const h = new Date(); 
    let l = new Date(h); l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const mAct = l.getMonth(); const aAct = l.getFullYear();
    const dsSem = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return gK(d); });

    let h0 = `<table><tr><th>NOMBRE</th><th>HS</th><th>TOTAL</th></tr>`;
    let tS = 0;
    personal.forEach(p => {
        let m = 0, hsT = 0; const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        dsSem.forEach(k => {
            const r = (asistencia[p] && asistencia[p][k]) ? asistencia[p][k] : null;
            if(r) {
                if(r.estado === 'presente') { m += (c.norm * c.jorn); hsT += c.jorn; }
                if(r.estado === 'horas') { m += (c.norm * c.jorn) + (r.horas * c.ext); hsT += (c.jorn + r.horas); }
            }
        });
        tS += m; h0 += `<tr><td>${p}</td><td>${hsT}</td><td>$${m.toLocaleString()}</td></tr>`;
    });
    document.getElementById('t0').innerHTML = h0 + `<tr style="color:var(--amarillo)"><td>TOTAL</td><td>-</td><td>$${tS.toLocaleString()}</td></tr></table>`;

    let h1 = `<table><tr><th>NOMBRE</th><th>MES ACUM.</th></tr>`;
    personal.forEach(p => {
        let m = 0; const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        if(asistencia[p]) {
            Object.keys(asistencia[p]).forEach(fk => {
                if(fk.startsWith(`${aAct}-${(mAct+1).toString().padStart(2,'0')}`)) {
                    const r = asistencia[p][fk];
                    if(r.estado === 'presente') m += (c.norm * c.jorn);
                    if(r.estado === 'horas') m += (c.norm * c.jorn) + (r.horas * c.ext);
                }
            });
        }
        h1 += `<tr><td>${p}</td><td>$${m.toLocaleString()}</td></tr>`;
    });
    document.getElementById('t1').innerHTML = h1 + `</table>`;

    let h2 = `<table><tr><th>NOMBRE</th><th>$/H</th><th>$/E</th></tr>`;
    personal.forEach(p => {
        const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        h2 += `<tr><td>${p}</td>
            <td><input type="number" value="${c.norm}" onchange="costosConfig['${p}'].norm=parseFloat(this.value)"></td>
            <td><input type="number" value="${c.ext}" onchange="costosConfig['${p}'].ext=parseFloat(this.value)"></td>
        </tr>`;
    });
    document.getElementById('t2').innerHTML = h2 + `</table>`;

    let h3 = `<input type="text" id="new-p" placeholder="Nombre..." style="width:60%"><button onclick="addPers()" style="width:30%; padding:8px; background:var(--verde); border:none; border-radius:4px; color:white">Añadir</button>`;
    personal.forEach((p, i) => { h3 += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333"><span>${p}</span><button onclick="delPers(${i})" style="color:var(--rojo); background:none; border:none">✕</button></div>`; });
    document.getElementById('t3').innerHTML = h3;
}

function addPers() { const n = document.getElementById('new-p').value; if(n) { personal.push(n); actualizarTablas(); } }
function delPers(i) { if(confirm("¿Eliminar?")) { personal.splice(i,1); actualizarTablas(); } }

function abrirAsis(p, dk) {
    mPers = p; mDk = dk;
    const v = (asistencia[p] && asistencia[p][dk]) ? asistencia[p][dk] : {horas:''};
    document.getElementById('modal-asistencia').innerHTML = `
      <h3 style="margin-top:0">${p}</h3>
      <button class="btn-acc" style="background:var(--verde); width:100%; margin-bottom:8px; color:white; font-size:12px" onclick="setA('presente')">PRESENTE</button>
      <button class="btn-acc" style="background:var(--rojo); width:100%; margin-bottom:8px; color:white; font-size:12px" onclick="setA('ausente')">AUSENTE</button>
      <input type="number" id="h-in" style="width:100%; margin-bottom:8px; background:#111; color:white; border:1px solid #444" value="${v.horas}" placeholder="Horas Extra">
      <button class="btn-acc" style="background:var(--azul); width:100%; color:white; font-size:12px" onclick="setA('horas')">CARGAR HS</button>
      <button onclick="document.getElementById('asistencia-overlay').style.display='none'" style="margin-top:15px; background:none; border:none; color:#888; width:100%">CANCELAR</button>`;
    document.getElementById('asistencia-overlay').style.display = 'flex';
}

function setA(e) {
    let h = parseFloat(document.getElementById('h-in').value) || 0;
    if(!asistencia[mPers]) asistencia[mPers] = {};
    asistencia[mPers][mDk] = {estado: e, horas: h};
    document.getElementById('asistencia-overlay').style.display = 'none';
    render();
}

function moverSem(v) { semOff += v; render(); }
render();
</script>
</body>
</html>
