<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SDB — Control de Personal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  :root { --amarillo: #F5C400; --fondo: #1A1A1A; --sup: #242424; --borde: #3A3A3A; --texto: #F0EDE4; --verde: #3DB85A; --rojo: #E24B4A; --azul: #3498db; --naranja: #e67e22; }
  
  html, body { 
    background: var(--fondo); color: var(--texto); 
    font-family: -apple-system, sans-serif; 
    height: 100%; width: 100%; margin: 0; padding: 0;
    overflow: hidden; position: fixed; 
  }

  /* CABECERA */
  #header-fijo { 
    position: absolute; top: 0; left: 0; right: 0; height: 115px; 
    background: var(--sup); z-index: 100; border-bottom: 2px solid var(--amarillo);
  }
  .controles { display: flex; gap: 5px; padding: 10px; }
  .btn-acc { flex: 1; border: none; padding: 10px 5px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
  .btn-web { background: var(--amarillo); color: #1A1A1A; }
  .btn-pdf-sem { background: var(--azul); color: white; }
  .btn-pdf-mes { background: var(--naranja); color: white; }
  
  .nav-sem { display: flex; align-items: center; padding: 5px 10px; background: #2E2E2E; justify-content: space-between; font-size: 11px; }

  /* LISTADO */
  #scroll-area { 
    position: absolute; top: 115px; bottom: 0; left: 0; right: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px;
  }
  .grid-header { display: grid; grid-template-columns: 90px repeat(7, 1fr); background: var(--sup); }
  .d-col { text-align: center; padding: 8px 2px; font-size: 9px; font-weight: 700; color: #888; }
  .fila { display: grid; grid-template-columns: 90px repeat(7, 1fr); border-bottom: 1px solid var(--borde); align-items: center; min-height: 55px; }
  .nom { font-size: 10px; font-weight: 700; padding-left: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  
  .btn-est { width: 32px; height: 32px; border-radius: 6px; border: none; background: #2E2E2E; color: #444; font-size: 12px; font-weight: bold; margin: auto; }
  .btn-est.presente { background: rgba(61,184,90,0.3); color: var(--verde); }
  .btn-est.ausente { background: rgba(226,75,74,0.3); color: var(--rojo); }
  .btn-est.horas { background: rgba(52,152,219,0.3); color: var(--azul); border: 1px solid var(--azul); }

  /* BOTÓN MENÚ */
  #fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--amarillo); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 150; border: none; }
  #fab span { width: 25px; height: 3px; background: #1A1A1A; border-radius: 2px; }

  /* OVERLAYS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; overscroll-behavior: contain; }
  .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--sup); padding: 10px; gap: 5px; }
  .tab-btn { padding: 10px; border: none; border-radius: 8px; background: #333; color: #888; font-size: 10px; font-weight: 800; }
  .tab-btn.active { background: var(--amarillo); color: #1A1A1A; }
  .tab-content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
  .tab-content.active { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  td { padding: 12px 0; border-bottom: 1px solid #333; }
  th { text-align: left; color: #888; font-size: 10px; padding-bottom: 5px; }
  input { background: #333; border: 1px solid var(--borde); color: white; padding: 10px; border-radius: 5px; width: 100%; text-align: center; font-size: 16px; }
  .total-row { color: var(--amarillo); font-weight: bold; background: rgba(245,196,0,0.05); }
</style>
</head>
<body>

<div id="header-fijo">
  <div class="controles">
    <button class="btn-acc btn-web" onclick="guardarWeb()">💾 Guardar Local</button>
    <button class="btn-acc btn-pdf-sem" onclick="generarPDF('semanal')">📄 PDF Semanal</button>
    <button class="btn-acc btn-pdf-mes" onclick="generarPDF('mensual')">📅 PDF Mensual</button>
  </div>
  <div class="nav-sem">
    <button onclick="moverSem(-1)" style="background:none; border:none; color:white; font-size:20px">‹</button>
    <div id="tit-sem"></div>
    <button onclick="moverSem(1)" style="background:none; border:none; color:white; font-size:20px">›</button>
  </div>
  <div class="grid-header" id="dias-h"></div>
</div>

<div id="scroll-area"><div id="lista"></div></div>

<button id="fab" onclick="abrirMenu()"><span></span><span></span><span></span></button>

<div class="overlay" id="menu-overlay">
  <div class="tabs">
    <button class="tab-btn active" onclick="verTab(0)">SEMANAL</button>
    <button class="tab-btn" onclick="verTab(1)">MENSUAL</button>
    <button class="tab-btn" onclick="verTab(2)">PRECIOS</button>
    <button class="tab-btn" onclick="verTab(3)">PERSONAL</button>
  </div>
  <div id="t0" class="tab-content active"></div>
  <div id="t1" class="tab-content"></div>
  <div id="t2" class="tab-content"></div>
  <div id="t3" class="tab-content"></div>
  <button onclick="cerrarMenu()" style="margin: 15px; padding: 18px; background: var(--amarillo); color: #1A1A1A; border: none; border-radius: 10px; font-weight: 900;">VOLVER A PLANILLA</button>
</div>

<div class="overlay" id="asistencia-overlay" style="justify-content:center; align-items:center; padding:20px">
  <div id="modal-asistencia" style="background:var(--sup); width:100%; max-width:400px; padding:20px; border-radius:15px; border:1px solid var(--borde)"></div>
</div>

<script>
let personal = ['Adolf.', 'Andrs.', 'Eleu.', 'Gavin', 'Vict.', 'Nildo', 'Geron.', 'Dario.', 'Alberto Manuel', 'JuanC. Velasq.'];
let asistencia = JSON.parse(localStorage.getItem('as_sdb')) || {};
let costosConfig = JSON.parse(localStorage.getItem('co_sdb')) || {};
let semOff = 0; let mPers = '', mDk = '';
const DIAS = ['LU','MA','MI','JU','VI','SA','DO'];

function checkConfig() {
  personal.forEach(p => { if(!costosConfig[p]) costosConfig[p] = { norm: 0, ext: 0, jorn: 9 }; });
}

function guardarWeb() {
    localStorage.setItem('as_sdb', JSON.stringify(asistencia));
    localStorage.setItem('co_sdb', JSON.stringify(costosConfig));
    alert("Datos guardados en este dispositivo.");
    render();
}

function generarPDF(tipo) {
    actualizarTablas();
    const h = new Date(); 
    let l = new Date(h); l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    
    const tituloReporte = tipo === 'semanal' ? 'Resumen Semanal' : 'Resumen Mensual';
    const subTitulo = tipo === 'semanal' ? document.getElementById('tit-sem').textContent : l.toLocaleString('es', {month:'long', year:'numeric'}).toUpperCase();
    const contenidoId = tipo === 'semanal' ? 't0' : 't1';
    
    const elemento = document.createElement('div');
    elemento.innerHTML = `
        <div style="padding: 30px; color: #000; font-family: Arial, sans-serif;">
            <h1 style="border-bottom: 3px solid #F5C400; margin-bottom: 5px;">SDB — CONTROL PERSONAL</h1>
            <h2 style="color: #444; margin-top: 0;">${tituloReporte}</h2>
            <h3 style="color: #666;">Periodo: ${subTitulo}</h3>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <div style="margin-top: 10px;">
                ${document.getElementById(contenidoId).innerHTML}
            </div>
            <br><br>
            <p style="font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 10px;">
                Reporte de obra generado el: ${new Date().toLocaleString()}
            </p>
        </div>
    `;

    const opt = {
        margin:       0.5,
        filename:     `${tituloReporte}_SDB_${subTitulo.replace(/ /g, '_')}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(elemento).save();
}

const gK = d => `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;

function render() {
    const h = new Date(); let l = new Date(h);
    l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const ds = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return d; });
    
    document.getElementById('tit-sem').textContent = ds[0].getDate() + " al " + ds[6].getDate() + " " + ds[0].toLocaleString('es', {month:'short'}).toUpperCase();
    document.getElementById('dias-h').innerHTML = '<div class="d-col"></div>' + ds.map((d,i) => `<div class="d-col">${DIAS[i]}<br>${d.getDate()}</div>`).join('');
    
    document.getElementById('lista').innerHTML = personal.map(p => `
      <div class="fila">
        <div class="nom">${p}</div>
        ${ds.map(d => {
            const v = (asistencia[p] && asistencia[p][gK(d)]) ? asistencia[p][gK(d)] : {estado:'vacio'};
            let t = v.estado === 'presente' ? '✓' : (v.estado === 'ausente' ? '✕' : (v.estado === 'horas' ? v.horas+'h' : ''));
            return `<div style="text-align:center"><button class="btn-est ${v.estado}" onclick="abrirAsis('${p}','${gK(d)}')">${t}</button></div>`;
        }).join('')}
      </div>`).join('');
}

function abrirMenu() { actualizarTablas(); document.getElementById('menu-overlay').style.display = 'flex'; }
function cerrarMenu() { document.getElementById('menu-overlay').style.display = 'none'; window.scrollTo(0,0); render(); }

function verTab(n) {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[n].classList.add('active');
    document.getElementById('t' + n).classList.add('active');
    actualizarTablas();
}

function actualizarTablas() {
    const h = new Date(); 
    let l = new Date(h); l.setDate(h.getDate() - (h.getDay() === 0 ? 6 : h.getDay() - 1) + semOff * 7);
    const mAct = l.getMonth(); const aAct = l.getFullYear();
    const dsSem = [0,1,2,3,4,5,6].map(x => { let d = new Date(l); d.setDate(l.getDate() + x); return gK(d); });

    // SEMANAL
    let h0 = `<table><tr><th>PERSONA</th><th>HS</th><th>MONTO</th></tr>`;
    let tS = 0;
    personal.forEach(p => {
        let m = 0, hsT = 0; const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        dsSem.forEach(k => {
            const r = (asistencia[p] && asistencia[p][k]) ? asistencia[p][k] : null;
            if(r) {
                if(r.estado === 'presente') { m += (c.norm * c.jorn); hsT += c.jorn; }
                if(r.estado === 'horas') { m += (c.norm * c.jorn) + (r.horas * c.ext); hsT += (c.jorn + r.horas); }
            }
        });
        tS += m; h0 += `<tr><td>${p}</td><td>${hsT}</td><td>$${m.toLocaleString()}</td></tr>`;
    });
    document.getElementById('t0').innerHTML = h0 + `<tr class="total-row"><td>TOTAL SEMANA</td><td>-</td><td>$${tS.toLocaleString()}</td></tr></table>`;

    // MENSUAL
    let h1 = `<table><tr><th>PERSONA</th><th>MONTO ACUM.</th></tr>`;
    let tM = 0;
    personal.forEach(p => {
        let m = 0; const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        if(asistencia[p]) {
            Object.keys(asistencia[p]).forEach(fk => {
                // Filtramos por año y mes de la semana actual
                if(fk.startsWith(`${aAct}-${(mAct+1).toString().padStart(2,'0')}`)) {
                    const r = asistencia[p][fk];
                    if(r.estado === 'presente') m += (c.norm * c.jorn);
                    if(r.estado === 'horas') m += (c.norm * c.jorn) + (r.horas * c.ext);
                }
            });
        }
        tM += m; h1 += `<tr><td>${p}</td><td>$${m.toLocaleString()}</td></tr>`;
    });
    document.getElementById('t1').innerHTML = h1 + `<tr class="total-row"><td>TOTAL MES</td><td>$${tM.toLocaleString()}</td></tr></table>`;

    // PRECIOS
    let h2 = `<table><tr><th>PERSONA</th><th>$/HORA</th><th>$/EXTRA</th></tr>`;
    personal.forEach(p => {
        const c = costosConfig[p] || {norm:0, ext:0, jorn:9};
        h2 += `<tr><td>${p}</td>
            <td><input type="number" value="${c.norm}" onchange="costosConfig['${p}'].norm=parseFloat(this.value)"></td>
            <td><input type="number" value="${c.ext}" onchange="costosConfig['${p}'].ext=parseFloat(this.value)"></td>
        </tr>`;
    });
    document.getElementById('t2').innerHTML = h2 + `</table>`;

    // PERSONAL
    let h3 = `<input type="text" id="new-p" placeholder="Nombre de la persona..." style="width:70%; margin-bottom:10px"> 
              <button onclick="addPers()" style="width:25%; background:var(--verde); border:none; padding:12px; border-radius:5px; color:white">OK</button>`;
    personal.forEach((p, i) => {
        h3 += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #333">
               <span>${p}</span><button onclick="delPers(${i})" style="color:var(--rojo); background:none; border:none; font-weight:bold">✕</button></div>`;
    });
    document.getElementById('t3').innerHTML = h3;
}

function addPers() { 
    const n = document.getElementById('new-p').value; 
    if(n) { personal.push(n); costosConfig[n] = {norm:0, ext:0, jorn:9}; actualizarTablas(); }
}
function delPers(i) { if(confirm("¿Quitar de la lista?")) { personal.splice(i, 1); actualizarTablas(); } }

function abrirAsis(p, dk) {
    mPers = p; mDk = dk;
    const v = (asistencia[p] && asistencia[p][dk]) ? asistencia[p][dk] : {horas:''};
    document.getElementById('modal-asistencia').innerHTML = `
      <h3 style="text-align:center; color:var(--amarillo)">${p}</h3>
      <button class="btn-acc" style="background:var(--verde); width:100%; margin-bottom:10px; color:white" onclick="setA('presente')">PRESENTE</button>
      <button class="btn-acc" style="background:var(--rojo); width:100%; margin-bottom:10px; color:white" onclick="setA('ausente')">AUSENTE</button>
      <input type="number" id="h-in" style="width:100%; padding:15px; margin-bottom:10px; background:#1A1A1A; border:1px solid #444; color:white; font-size:16px" value="${v.horas}" placeholder="Horas Extra">
      <button class="btn-acc" style="background:var(--azul); width:100%; color:white" onclick="setA('horas')">CARGAR</button>
      <button onclick="document.getElementById('asistencia-overlay').style.display='none'" style="width:100%; background:none; border:none; color:#888; margin-top:20px">CANCELAR</button>
    `;
    document.getElementById('asistencia-overlay').style.display = 'flex';
}

function setA(e) {
    let h = parseFloat(document.getElementById('h-in').value) || 0;
    if(e === 'horas' && h === 0) e = 'presente';
    if(!asistencia[mPers]) asistencia[mPers] = {};
    asistencia[mPers][mDk] = {estado: e, horas: h};
    document.getElementById('asistencia-overlay').style.display = 'none';
    render();
}

function moverSem(v) { semOff += v; render(); }

checkConfig(); 
render();
</script>
</body>
</html>
